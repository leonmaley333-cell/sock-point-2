    <script>
let lastScroll = 0;

window.addEventListener('scroll', () => {
  const currentScroll = window.pageYOffset;
  const header = document.querySelector('.header');
  const boxlogo = document.querySelector('.boxlogo');
const nieuwbox = document.querySelector('.nieuwbox');
const damesbox = document.querySelector('.damesbox');
const herenbox = document.querySelector('.herenbox');
const salebox = document.querySelector('.salebox');
const boxicon1 = document.querySelector('.boxicon1');
const boxicon2 = document.querySelector('.boxicon2');
const boxicon3 = document.querySelector('.boxicon3');

  if (currentScroll > lastScroll) {

    header.style.backgroundColor = "#00b3ff";
        header.style.border = "0.1vw solid #f58132";
    header.style.color = "white";
nieuwbox.style.border = "0.1vw solid #f58132";
damesbox.style.border = "0.1vw solid #f58132";
herenbox.style.border = "0.1vw solid #f58132";
salebox.style.border = "0.1vw solid #f58132";
boxlogo.style.border = "0.1vw solid #f58132";
boxicon1.style.border = "0.1vw solid #f58132";
boxicon2.style.border = "0.1vw solid #f58132";
boxicon3.style.border = "0.1vw solid #f58132";

  } else {

    header.style.border = "0.1vw solid purple";
       header.style.color = "white";
nieuwbox.style.border = "0.1vw solid purple";
damesbox.style.border = "0.1vw solid purple";
herenbox.style.border = "0.1vw solid purple";
salebox.style.border = "0.1vw solid purple";
boxlogo.style.border = "0.1vw solid purple";
boxicon1.style.border = "0.1vw solid purple";
boxicon2.style.border = "0.1vw solid purple";
boxicon3.style.border = "0.1vw solid purple";
  }
  
  lastScroll = currentScroll;
});

    </script>
